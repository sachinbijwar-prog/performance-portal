                    <label class="block text-sm font-semibold text-slate-700 mb-1">KRA Title</label>
                    <input type="text" id="new-kra-title" placeholder="e.g. Quality Excellence"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Weightage (%)</label>
                    <input type="number" id="new-kra-weight" min="1" max="100"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Description</label>
                    <textarea id="new-kra-desc" rows="3"
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                </div>
            </div>
            <div class="mt-8 flex space-x-3">
                <button onclick="document.getElementById('modal-kra').classList.add('hidden')"
                    class="flex-1 py-3 text-slate-600 font-semibold hover:bg-slate-50 rounded-xl transition-all">Cancel</button>
                <button id="btn-add-kra-confirm"
                    class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/20 hover:bg-indigo-700 transition-all">Create
                    KRA</button>
            </div>
        </div>
    </div>

    <!-- AI Suggestion / Notification Toast -->
    <div id="ai-suggestion" class="fixed bottom-8 right-8 z-[100] transform translate-y-32 transition-all duration-500">
        <div class="glass-card p-6 border-l-4 border-orange-500 max-w-sm flex items-start space-x-4">
            <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center flex-shrink-0">
                <i data-lucide="sparkles" class="w-6 h-6 text-orange-600"></i>
            </div>
            <div>
                <p class="text-[10px] font-black text-orange-500 uppercase tracking-[0.2em] mb-1">Notification</p>
                <p id="ai-text" class="text-sm text-slate-600 font-medium leading-relaxed">Alert message goes here.</p>
            </div>
        </div>
    </div>

    <!-- Change PIN Modal -->
    <div id="change-pin-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="document.getElementById('change-pin-modal').classList.add('hidden')"></div>
        <div class="relative bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl animate-fade-in border border-slate-100">
            <button onclick="document.getElementById('change-pin-modal').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-50 hover:bg-slate-100 rounded-full p-2 transition-all">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
            <div class="mb-6">
                <div class="w-12 h-12 bg-orange-100 rounded-2xl flex items-center justify-center mb-4 text-orange-600">
                    <i data-lucide="key" class="w-6 h-6"></i>
                </div>
                <h3 class="text-xl font-black text-slate-800">Change Password</h3>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">Update your access credentials</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">New Password</label>
                    <input type="password" id="new-pin-input" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-orange-500/20 outline-none" placeholder="Min 4 characters">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Confirm Password</label>
                    <input type="password" id="confirm-pin-input" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:ring-2 focus:ring-orange-500/20 outline-none" placeholder="Repeat password">
                </div>
                <button onclick="submitPinChange()" class="w-full py-4 bg-orange-600 hover:bg-orange-700 text-white font-black rounded-2xl shadow-lg shadow-orange-600/20 transition-all mt-4">
                    UPDATE PASSWORD
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Unified Script -->
    <script src="js/performance-app.js"></script>
    <script>
        // Init Lucide on load
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // Apply saved dark mode preference
            if (localStorage.getItem('sa_dark_mode') === 'true') {
                document.documentElement.classList.add('dark');
                const icon = document.getElementById('dark-mode-icon');
                if (icon) { icon.setAttribute('data-lucide', 'sun'); lucide.createIcons(); }
            }
        });

        window.toggleDarkMode = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('sa_dark_mode', isDark);
            const icon = document.getElementById('dark-mode-icon');
            if (icon) { icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon'); lucide.createIcons(); }
        };
    </script>
</body>

</html>
